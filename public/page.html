<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        #bg-grid {
            position: fixed;
            will-change: transform;
            background-size: 2.5rem 2.5rem;
            background-image: linear-gradient(90deg,rgba(0,0,0,.133) 1px,transparent 0),linear-gradient(180deg,rgba(5,5,5,.133) 1px,transparent 0);
            z-index: -2
        }

        #bg-grid,#blur-grid {
            inset: 0;
            height: 100vh;
        }

        #blur-grid {
             background:radial-gradient(circle,hsla(0,8%,95%,.6) 0,hsla(0,11%,96%,.97) 90%,#fff 100%);
             z-index:-1;
        }

        @media screen and (max-width: 600px) {
            #bg-grid {
                background-size:1.5rem 1.5rem
            }
        }
    </style>
</head>
<body>

<div id="bg-grid"><div id="blur-grid"></div></div>



</body>
</html>
